<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My Boxy Directory</title>
	<style>
		body {
			font-family: monospace, "Courier New", Courier, sans-serif;
			background-color: #e5e5e5;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			margin: 0;
			padding: 60px 24px;
			box-sizing: border-box;
			overflow-x: hidden;
		}

		.card-wrapper {
			position: relative;
			width: 100%;
			max-width: 520px;
			display: flex;
			justify-content: center;
		}

		.directory-card {
			background-color: #ffffff;
			padding: 36px;
			border: 5px solid #000000;
			border-radius: 0;
			box-shadow: 10px 10px 0px #000000;
			width: 100%;
			position: relative;
			z-index: 2;
		}

		h1 {
			margin-top: 0;
			font-size: 2.05rem;
			text-transform: uppercase;
			letter-spacing: 1px;
			border-bottom: 5px solid #000000;
			padding-bottom: 12px;
			margin-bottom: 26px;
		}

		.account-item {
			display: flex;
			align-items: center;
			padding: 18px 22px;
			margin-bottom: 18px;
			background-color: #ffffff;
			border: 4px solid #000000;
			border-radius: 0;
			transition: transform 0.12s ease, box-shadow 0.12s ease;
		}

		.account-item:hover {
			transform: translate(-5px, -5px);
			box-shadow: 7px 7px 0px #000000;
		}

		.social-icon {
			width: 55px;
			height: 55px;
			margin-right: 18px;
			border: 3px solid #000000;
			object-fit: cover;
		}

		.platform-info {
			flex-grow: 1;
			display: flex;
			flex-direction: column;
		}

		.platform-name {
			font-weight: bold;
			font-size: 1.4em;
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}

		.credential-value {
			color: #222222;
			font-size: 1.08em;
			margin-top: 5px;
			font-weight: 600;
		}

		/* Decorative Artsy Arrows */
		.artsy-arrow {
			position: absolute;
			z-index: 3;
			pointer-events: none;
			filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.15));
		}

		.arrow-top-left {
			top: -115px;
			left: -165px;
			width: 235px;
			height: 195px;
			animation: float-slow 4s ease-in-out infinite alternate;
		}

		.arrow-bottom-right {
			bottom: -105px;
			right: -165px;
			width: 235px;
			height: 195px;
			animation: float-slow 4s ease-in-out infinite alternate-reverse;
		}

		.arrow-top-right {
			top: -95px;
			right: -150px;
			width: 205px;
			height: 170px;
			animation: float-slow 3.5s ease-in-out infinite alternate;
		}

		@keyframes float-slow {
			0% {
				transform: translateY(0px) rotate(0deg);
			}

			100% {
				transform: translateY(-8px) rotate(2deg);
			}
		}

		/* Hide decoration on narrower screens to prevent horizontal scroll */
		@media (max-width: 880px) {
			.artsy-arrow {
				display: none;
			}
		}
	</style>
</head>

<body>

	<div class="card-wrapper">

		<!-- Artsy Arrow 1: Top Left pointing down-right towards the card -->
		<svg class="artsy-arrow arrow-top-left" viewBox="0 0 140 120" fill="none" xmlns="http://www.w3.org/2000/svg">
			<!-- Handwritten text label -->
			<text x="5" y="20" font-family="monospace" font-weight="bold" font-size="17" fill="#000"
				transform="rotate(-8 5 20)">add me! ✨</text>
			<!-- Curved swoop path -->
			<path d="M 25 35 C 50 15, 100 25, 115 85" stroke="#000000" stroke-width="5" stroke-linecap="round"
				fill="none" />
			<!-- Arrowhead -->
			<path d="M 94 68 L 115 85 L 118 60" stroke="#000000" stroke-width="5" stroke-linecap="round"
				stroke-linejoin="round" fill="none" />
			<!-- Decorative doodle dots -->
			<circle cx="20" cy="40" r="3" fill="#000" />
			<circle cx="13" cy="50" r="2" fill="#000" />
		</svg>

		<!-- Artsy Arrow 2: Top Right pointing down-left towards the card -->
		<svg class="artsy-arrow arrow-top-right" viewBox="0 -12 120 112" fill="none" xmlns="http://www.w3.org/2000/svg">
			<text x="30" y="4" font-family="monospace" font-weight="bold" font-size="16" fill="#000"
				transform="rotate(6 30 4)">hello! 👋</text>
			<path d="M 95 34 C 80 18, 35 26, 20 72" stroke="#000000" stroke-width="5" stroke-linecap="round"
				fill="none" />
			<path d="M 8 50 L 20 72 L 38 56" stroke="#000000" stroke-width="5" stroke-linecap="round"
				stroke-linejoin="round" fill="none" />
		</svg>

		<!-- Artsy Arrow 3: Bottom Right pointing up-left towards the card -->
		<svg class="artsy-arrow arrow-bottom-right" viewBox="0 0 140 130" fill="none"
			xmlns="http://www.w3.org/2000/svg">
			<path d="M 115 82 C 95 102, 40 90, 25 35" stroke="#000000" stroke-width="5" stroke-linecap="round"
				fill="none" />
			<!-- Arrowhead -->
			<path d="M 12 54 L 25 35 L 42 45" stroke="#000000" stroke-width="5" stroke-linecap="round"
				stroke-linejoin="round" fill="none" />
			<text x="25" y="120" font-family="monospace" font-weight="bold" font-size="16" fill="#000"
				transform="rotate(-4 25 120)">my socials! 🚀</text>
		</svg>

		<div class="directory-card">
			<h1>Connect with Me</h1>

			<!-- Facebook -->
			<div class="account-item">
				<img src="assets/facebook_logo.webp" alt="Facebook" class="social-icon">
				<div class="platform-info">
					<span class="platform-name">Facebook</span>
					<span class="credential-value">@mjcortejo27</span>
				</div>
			</div>

			<!-- GitHub -->
			<div class="account-item">
				<img src="assets/github_logo.webp" alt="GitHub" class="social-icon">
				<div class="platform-info">
					<span class="platform-name">GitHub</span>
					<span class="credential-value">@mjcortejo</span>
				</div>
			</div>

			<!-- LinkedIn -->
			<div class="account-item">
				<img src="assets/linkedin_logo.webp" alt="LinkedIn" class="social-icon">
				<div class="platform-info">
					<span class="platform-name">LinkedIn</span>
					<span class="credential-value">/in/markjetc</span>
				</div>
			</div>

		</div>

	</div>

</body>

</html>
