<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My Boxy Directory</title>
	<style>
		body {
			font-family: monospace, "Courier New", Courier, sans-serif;
			background-color: #e5e5e5;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
		}

		.directory-card {
			background-color: #ffffff;
			padding: 30px;
			border: 4px solid #000000;
			border-radius: 0;
			box-shadow: 8px 8px 0px #000000;
			width: 100%;
			max-width: 400px;
		}

		h1 {
			margin-top: 0;
			text-transform: uppercase;
			border-bottom: 4px solid #000000;
			padding-bottom: 10px;
			margin-bottom: 25px;
		}

		.account-item {
			display: flex;
			align-items: center;
			padding: 15px;
			margin-bottom: 15px;
			background-color: #ffffff;
			border: 3px solid #000000;
			border-radius: 0;
			transition: transform 0.1s, box-shadow 0.1s;
		}

		.account-item:hover {
			transform: translate(-4px, -4px);
			box-shadow: 6px 6px 0px #000000;
		}

		.social-icon {
			width: 45px;
			height: 45px;
			margin-right: 15px;
			border: 2px solid #000000;
			object-fit: cover;
		}

		.platform-info {
			flex-grow: 1;
			display: flex;
			flex-direction: column;
		}

		.platform-name {
			font-weight: bold;
			font-size: 1.2em;
			text-transform: uppercase;
		}

		.credential-value {
			color: #333333;
			margin-top: 4px;
		}
	</style>
</head>

<body>

	<div class="directory-card">
		<h1>Credentials</h1>

		<!-- Facebook -->
		<div class="account-item">
			<img src="assets/facebook_logo.webp" alt="Facebook" class="social-icon">
			<div class="platform-info">
				<span class="platform-name">Facebook</span>
				<span class="credential-value">@your_facebook</span>
			</div>
		</div>

		<!-- GitHub -->
		<div class="account-item">
			<img src="assets/github_logo.webp" alt="GitHub" class="social-icon">
			<div class="platform-info">
				<span class="platform-name">GitHub</span>
				<span class="credential-value">@your_github</span>
			</div>
		</div>

		<!-- LinkedIn -->
		<div class="account-item">
			<img src="assets/linkedin_logo.webp" alt="LinkedIn" class="social-icon">
			<div class="platform-info">
				<span class="platform-name">LinkedIn</span>
				<span class="credential-value">/in/your_linkedin</span>
			</div>
		</div>

	</div>

</body>

</html>
